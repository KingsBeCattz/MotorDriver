sentence=Lightweight library for controlling DC motors and differential drive robots on Arduino.
paragraph=Provides a clean, layered API for single motor control and two-motor differential drive. Supports digital and PWM pin modes, optional enable pins, configurable digital activation threshold, and callback-based power and steering inputs. Includes two pivot modes (Center and Wheel) for flexible turning behavior, as well as a quick-spin mode for maximum rotation speed.
